<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Self Hosted Maps</title>
  <link href="/vendor/maplibre-gl.css" rel="stylesheet" />
  <link href="/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="overlay-stack">
    <div class="banner-row">
      <div class="banner">Self Hosted Maps</div>
      <button id="configBtn" class="config-button" type="button">Maps</button>
    </div>
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="address or lat,lng" />
      <button id="goBtn" type="button">Go</button>
    </div>
    <div id="viewerNotice" class="viewer-notice" hidden></div>
    <div id="message" class="message"></div>
  </div>

  <div id="flightControls" class="flight-controls" data-open="false" data-pinned="false">
    <button
      id="flightMenuToggle"
      class="flight-menu-toggle"
      type="button"
      aria-label="Live data layers"
      aria-expanded="false"
      aria-controls="flightMenuPanel"
      aria-haspopup="true"
      title="Live data layers"
    >
      <span class="flight-menu-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path
            fill="currentColor"
            d="M12 3.4 3.4 7.8 12 12.2l8.6-4.4zM5.6 11.2 12 14.5l6.4-3.3 2.2 1.1L12 16.8l-8.6-4.5zM5.6 15.5 12 18.8l6.4-3.3 2.2 1.1L12 21.1l-8.6-4.5z"
          />
        </svg>
      </span>
    </button>
    <div id="flightMenuPanel" class="flight-menu-panel" aria-hidden="true">
      <div class="layer-menu-section">
        <div class="layer-menu-heading">Live layers</div>
        <button id="toggleOpenSky" class="flight-button" type="button" tabindex="-1">OpenSky</button>
        <button id="toggleAdsbx" class="flight-button" type="button" tabindex="-1">ADS-B Exchange</button>
        <button id="toggleAisVessels" class="flight-button" type="button" tabindex="-1">AIS vessels</button>
        <button id="toggleTrafficFlow" class="flight-button" type="button" tabindex="-1">Traffic flow</button>
        <button id="toggleTrafficIncidents" class="flight-button" type="button" tabindex="-1">Traffic incidents</button>
      </div>
      <div class="layer-menu-section">
        <div class="layer-menu-heading">Offline imagery</div>
        <div id="imageryOverlayControls" class="imagery-overlay-controls">
          <button class="flight-button unavailable" type="button" disabled tabindex="-1">Imagery unavailable</button>
        </div>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <div id="configModal" class="modal" aria-modal="true" role="dialog" aria-labelledby="configTitle">
    <div class="modal-panel">
      <div class="modal-header">
        <h2 id="configTitle">Map Configuration</h2>
        <button id="closeConfigBtn" class="secondary" type="button">Close</button>
      </div>

      <div class="modal-grid">
        <section class="modal-section">
          <h3>Current Map</h3>
          <div id="mapSummary" class="summary-list"></div>
        </section>

        <section class="modal-section">
          <h3>Downloaded Maps</h3>
          <div id="downloadedMaps" class="dataset-list"></div>
        </section>

        <section class="modal-section">
          <h3>Active Map Selection</h3>
          <div id="selectionList" class="selection-list"></div>
          <div class="toolbar-row">
            <button id="applySelectionBtn" type="button">Apply Selection</button>
          </div>
        </section>

        <section class="modal-section">
          <h3>Download New Maps</h3>
          <div class="toolbar-row">
            <input id="catalogSearchInput" type="text" placeholder="Search by name, id, provider, or parent" />
            <button id="catalogSearchBtn" type="button">Search</button>
            <button id="refreshCatalogBtn" class="secondary" type="button">Refresh Catalog</button>
          </div>
          <div id="catalogResults" class="catalog-results"></div>
        </section>

        <section class="modal-section">
          <h3>Admin Job Status</h3>
          <div id="jobStatus" class="job-status">No active admin job.</div>
          <div id="jobLog" class="job-log">
            <pre id="jobLogBody"></pre>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="/vendor/maplibre-gl.js"></script>
  <script src="/app.js"></script>
</body>
</html>
